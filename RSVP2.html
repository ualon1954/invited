<!DOCTYPE html>
<html lang="he"></html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Responsive Form</title>
  <link rel="stylesheet" href="styles/resp2.css">
  <link rel="stylesheet" href="styles/bracha.css">
</head>
<body>

<div class="form-container">
    <h1>💍 שיר & איתי 💍</h1>
    <p id="head">נשמח לראותכם חוגגים איתנו 🥳 ❤️</p>

    <form id="contactForm">
        <div class="form-group">
             <img src="images/הזמנה לחתונה שיר ויובל.jpg" alt="">
        </div>

        <div class="form-group">
            <!-- <label>Name</label> -->
            <input id="name" disabled>
        </div>

        <div class="form-group">
            <!-- <label>Email</label> -->
            <input id="mobile" disabled>
        </div>    
        <button id ="yes" value="מגיע">מגיע</button>
        <button id ="no" value="לא מגיע">לא מגיע</button>
     
            
        <div id="incnum" class="form-group">
           <button id="encr" type="button" class="btninc" onclick="changeValue(1)">+</button>
           <input  id="guests"  value="1" min="1" max="8">
           <button id="decr" type="button" class="btninc" onclick="changeValue(-1)">-</button>
        </div>
        <div id="faq-item" class="form-group">
            <div class="faq-question">
            הוספת ברכה / הערה
                <span class="icon">+</span>
            </div>

            <div id="faq-answer" class="form-group">
                <div class="faq-answer-content">
                    <textarea id="notes" rows="6" class="faq-answer-content cols="50" placeholder="רשמו ברכה / הערה לאישור הגעה..."></textarea>
                </div>
            </div>
        </div>    
   
        <!-- <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="4"></textarea>
        </div> -->

        <!-- <button type="submit">Send</button> -->
    </form>
</div>
<script src="scripts/resp2.js" ></script>
<script src="scripts/bracha.js" ></script>

</body>
</html>
