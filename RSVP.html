<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שיר & איתי 💍 חתונה</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/resp.css" />
</head>

<body>

<div class="hero">
  <h1>💍 שיר & איתי 💍</h1>
</div>

<div class="container">
  <p>נשמח לראותכם חוגגים איתנו 🥳❤️</p>
  <label for="name">שם</label>
  <input id="name" disabled>
  <label for="mobile">טלפון</label>
  <input id="mobile" disabled>
  <!-- <div class = "atend" dir="rtl"> -->
    <label for="attendance">הגעה</label>
    <select id="attendance">
      <option value="מגיע">נגיע בשמחה 🎉</option>
      <option value="לא מגיע">לא נוכל להגיע</option>
    </select>

    <!-- <input id="guests" type="number"> -->
  <label for="incnum">כמות</label>   
  <div id="incnum"> 
      <button type="button" class="btninc" onclick="changeValue(1)">+</button>
      <input  id="guests"  value="1" min="1" max="8">
      <button type="button" class="btninc" onclick="changeValue(-1)">-</button>
  </div>
  <!-- <textarea id="notes" placeholder="הערות (כשרות, הסעות וכו')"></textarea> -->

  <button onclick="send()">אישור הגעה</button>

  <p id="msg"></p>
</div>

<script src="scripts/resp.js"></script>

</body>
</html>
